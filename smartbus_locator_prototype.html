
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }
  :root {
    --primary: #1a56db;
    --primary-light: #e8f0fe;
    --accent: #f59e0b;
    --surface: var(--color-background-primary);
    --surface2: var(--color-background-secondary);
    --border: var(--color-border-tertiary);
    --text: var(--color-text-primary);
    --text2: var(--color-text-secondary);
    --green: #10b981;
    --red: #ef4444;
    --orange: #f59e0b;
  }

  .app { display: flex; flex-direction: column; height: 640px; background: var(--surface2); border-radius: var(--border-radius-lg); overflow: hidden; border: 0.5px solid var(--border); }
  
  .topbar {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 500;
    font-size: 15px;
    color: var(--text);
  }
  .logo-icon {
    width: 28px; height: 28px;
    background: #1a56db;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-icon svg { width: 16px; height: 16px; fill: white; }
  .search-bar {
    flex: 1;
    display: flex;
    align-items: center;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: var(--border-radius-md);
    padding: 6px 12px;
    gap: 8px;
  }
  .search-bar input {
    border: none;
    background: transparent;
    font-size: 13px;
    color: var(--text);
    outline: none;
    flex: 1;
  }
  .live-dot {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 500; color: var(--green);
    flex-shrink: 0;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .main { display: flex; flex: 1; overflow: hidden; }

  .sidebar {
    width: 280px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 0.5px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-tabs {
    display: flex;
    border-bottom: 0.5px solid var(--border);
    flex-shrink: 0;
  }
  .tab {
    flex: 1;
    padding: 10px 8px;
    font-size: 12px;
    font-weight: 500;
    text-align: center;
    cursor: pointer;
    color: var(--text2);
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .tab.active { color: #1a56db; border-bottom-color: #1a56db; }

  .route-list { flex: 1; overflow-y: auto; padding: 8px; }
  .route-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    border-radius: var(--border-radius-md);
    cursor: pointer;
    transition: background 0.12s;
    border: 0.5px solid transparent;
    margin-bottom: 4px;
  }
  .route-item:hover { background: var(--surface2); }
  .route-item.active { background: #e8f0fe; border-color: #c7d8fa; }
  .route-badge {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 500; font-size: 13px; flex-shrink: 0;
  }
  .route-info { flex: 1; min-width: 0; }
  .route-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .route-sub { font-size: 11px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .eta-badge {
    font-size: 11px; font-weight: 500; padding: 3px 8px;
    border-radius: 20px; flex-shrink: 0;
  }
  .eta-green { background: #d1fae5; color: #065f46; }
  .eta-amber { background: #fef3c7; color: #92400e; }
  .eta-red { background: #fee2e2; color: #991b1b; }

  .panel-bottom {
    border-top: 0.5px solid var(--border);
    padding: 12px;
    flex-shrink: 0;
  }
  .stat-row { display: flex; gap: 8px; }
  .stat-card {
    flex: 1; padding: 8px 10px;
    background: var(--surface2);
    border-radius: var(--border-radius-md);
    text-align: center;
  }
  .stat-num { font-size: 18px; font-weight: 500; color: var(--text); }
  .stat-lbl { font-size: 10px; color: var(--text2); margin-top: 2px; }

  .map-area {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #e8edf2;
  }
  canvas#mapCanvas { position: absolute; top: 0; left: 0; }

  .map-controls {
    position: absolute; top: 12px; right: 12px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .map-btn {
    width: 32px; height: 32px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--border-radius-md);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 16px;
    color: var(--text);
    transition: background 0.12s;
  }
  .map-btn:hover { background: var(--surface2); }

  .bus-popup {
    position: absolute;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--border-radius-lg);
    padding: 12px 14px;
    width: 200px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .popup-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .popup-badge {
    width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500;
  }
  .popup-title { font-size: 13px; font-weight: 500; color: var(--text); }
  .popup-sub { font-size: 11px; color: var(--text2); }
  .popup-rows { display: flex; flex-direction: column; gap: 4px; }
  .popup-row { display: flex; justify-content: space-between; font-size: 11px; }
  .popup-row span:first-child { color: var(--text2); }
  .popup-row span:last-child { font-weight: 500; color: var(--text); }

  .bottom-bar {
    background: var(--surface);
    border-top: 0.5px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    font-size: 12px;
    color: var(--text2);
  }
  .filter-chip {
    padding: 4px 12px;
    border-radius: 20px;
    border: 0.5px solid var(--border);
    cursor: pointer;
    font-size: 11px;
    font-weight: 500;
    color: var(--text2);
    background: var(--surface);
    transition: all 0.12s;
  }
  .filter-chip.active {
    background: #1a56db;
    color: white;
    border-color: #1a56db;
  }
  .spacer { flex: 1; }
  .last-update { font-size: 11px; color: var(--text2); }
</style>

<div class="app">
  <div class="topbar">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M4 16c0 1.1.9 2 2 2h1v1c0 .55.45 1 1 1s1-.45 1-1v-1h6v1c0 .55.45 1 1 1s1-.45 1-1v-1h1c1.1 0 2-.9 2-2V6c0-3.5-3.58-4-8-4S4 2.5 4 6v10zm3.5 1c-.83 0-1.5-.67-1.5-1.5S6.67 14 7.5 14s1.5.67 1.5 1.5S8.33 17 7.5 17zm9 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM12 4c3.84 0 6.08.39 6.71 2H5.29C5.92 4.39 8.16 4 12 4zM6 8h12v6H6V8z"/></svg>
      </div>
      SmartBus
    </div>
    <div class="search-bar">
      <svg width="14" height="14" fill="none" stroke="var(--text2)" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" placeholder="Search route or stop..." id="searchInput" />
    </div>
    <div class="live-dot">
      <div class="dot"></div>
      Live
    </div>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="sidebar-tabs">
        <div class="tab active" onclick="switchTab('routes',this)">Routes</div>
        <div class="tab" onclick="switchTab('nearby',this)">Nearby</div>
        <div class="tab" onclick="switchTab('fav',this)">Saved</div>
      </div>
      <div class="route-list" id="routeList"></div>
      <div class="panel-bottom">
        <div class="stat-row">
          <div class="stat-card">
            <div class="stat-num" id="activeBuses">24</div>
            <div class="stat-lbl">Active buses</div>
          </div>
          <div class="stat-card">
            <div class="stat-num" id="onTimeRate">87%</div>
            <div class="stat-lbl">On-time rate</div>
          </div>
          <div class="stat-card">
            <div class="stat-num" id="avgWait">4m</div>
            <div class="stat-lbl">Avg wait</div>
          </div>
        </div>
      </div>
    </div>

    <div class="map-area" id="mapArea">
      <canvas id="mapCanvas"></canvas>
      <div class="map-controls">
        <div class="map-btn" onclick="zoomIn()">+</div>
        <div class="map-btn" onclick="zoomOut()">−</div>
        <div class="map-btn" title="Center" onclick="resetView()">⊙</div>
      </div>
      <div class="bus-popup" id="busPopup" style="opacity:0; left:80px; top:80px;">
        <div class="popup-header">
          <div class="popup-badge" id="ppBadge"></div>
          <div>
            <div class="popup-title" id="ppTitle">Route 42A</div>
            <div class="popup-sub" id="ppSub">Bus #B-204</div>
          </div>
        </div>
        <div class="popup-rows">
          <div class="popup-row"><span>Speed</span><span id="ppSpeed">32 km/h</span></div>
          <div class="popup-row"><span>Next stop</span><span id="ppNext">City Hall</span></div>
          <div class="popup-row"><span>ETA</span><span id="ppEta">2 min</span></div>
          <div class="popup-row"><span>Occupancy</span><span id="ppOcc">68%</span></div>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <span>Filter:</span>
    <div class="filter-chip active" onclick="toggleFilter(this,'all')">All routes</div>
    <div class="filter-chip" onclick="toggleFilter(this,'on-time')">On time</div>
    <div class="filter-chip" onclick="toggleFilter(this,'delayed')">Delayed</div>
    <div class="filter-chip" onclick="toggleFilter(this,'crowded')">Crowded</div>
    <div class="spacer"></div>
    <div class="last-update">Updated <span id="updateTime">just now</span></div>
  </div>
</div>

<script>
const routes = [
  { id:'42A', name:'Route 42A', sub:'Central → Airport Terminal', color:'#1a56db', bg:'#e8f0fe', eta:2, status:'on-time' },
  { id:'7B', name:'Route 7B', sub:'Railway Station → Mall', color:'#10b981', bg:'#d1fae5', eta:5, status:'on-time' },
  { id:'15C', name:'Route 15C', sub:'University → Downtown', color:'#f59e0b', bg:'#fef3c7', eta:8, status:'delayed' },
  { id:'22', name:'Route 22', sub:'Harbor → City Center', color:'#8b5cf6', bg:'#ede9fe', eta:12, status:'on-time' },
  { id:'3X', name:'Route 3X', sub:'Suburbs → Tech Park', color:'#ef4444', bg:'#fee2e2', eta:3, status:'on-time' },
  { id:'9D', name:'Route 9D', sub:'North Gate → South Hub', color:'#0ea5e9', bg:'#e0f2fe', eta:15, status:'delayed' },
];

let selectedRoute = '42A';
let hoveredBus = null;
let zoom = 1;
let buses = [];
let stops = [];
let tick = 0;
let animFrame;

function buildRouteList() {
  const el = document.getElementById('routeList');
  el.innerHTML = '';
  routes.forEach(r => {
    const div = document.createElement('div');
    div.className = 'route-item' + (r.id === selectedRoute ? ' active' : '');
    div.id = 'ri-'+r.id;
    const etaClass = r.eta <= 3 ? 'eta-green' : r.eta <= 8 ? 'eta-amber' : 'eta-red';
    div.innerHTML = `
      <div class="route-badge" style="background:${r.bg};color:${r.color}">${r.id}</div>
      <div class="route-info">
        <div class="route-name">${r.name}</div>
        <div class="route-sub">${r.sub}</div>
      </div>
      <div class="eta-badge ${etaClass}">${r.eta}m</div>
    `;
    div.onclick = () => selectRoute(r.id);
    el.appendChild(div);
  });
}

function selectRoute(id) {
  selectedRoute = id;
  document.querySelectorAll('.route-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('ri-'+id);
  if(el) el.classList.add('active');
}

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

function toggleFilter(el, val) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');

function resize() {
  const area = document.getElementById('mapArea');
  canvas.width = area.clientWidth;
  canvas.height = area.clientHeight;
}

const roadNetwork = [
  { x1:.1, y1:.5, x2:.9, y2:.5, w:3 },
  { x1:.5, y1:.05, x2:.5, y2:.95, w:3 },
  { x1:.1, y1:.25, x2:.9, y2:.25, w:2 },
  { x1:.1, y1:.75, x2:.9, y2:.75, w:2 },
  { x1:.25, y1:.05, x2:.25, y2:.95, w:2 },
  { x1:.75, y1:.05, x2:.75, y2:.95, w:2 },
  { x1:.1, y1:.1, x2:.45, y2:.45, w:1.5 },
  { x1:.55, y1:.55, x2:.9, y2:.9, w:1.5 },
  { x1:.1, y1:.9, x2:.45, y2:.55, w:1.5 },
  { x1:.55, y1:.45, x2:.9, y2:.1, w:1.5 },
];

const stopDefs = [
  { x:.5, y:.5, name:'City Hall', major:true },
  { x:.25, y:.5, name:'West Gate', major:false },
  { x:.75, y:.5, name:'East Junction', major:false },
  { x:.5, y:.25, name:'North Terminal', major:true },
  { x:.5, y:.75, name:'South Hub', major:false },
  { x:.25, y:.25, name:'University', major:false },
  { x:.75, y:.75, name:'Tech Park', major:false },
  { x:.25, y:.75, name:'Harbor', major:false },
  { x:.75, y:.25, name:'Airport', major:true },
  { x:.1, y:.5, name:'West End', major:false },
  { x:.9, y:.5, name:'East End', major:false },
];

function initBuses() {
  const routeColors = { '42A':'#1a56db','7B':'#10b981','15C':'#f59e0b','22':'#8b5cf6','3X':'#ef4444','9D':'#0ea5e9' };
  buses = [];
  routes.forEach(r => {
    const count = Math.floor(Math.random()*2)+2;
    for(let i=0;i<count;i++){
      buses.push({
        route: r.id,
        color: routeColors[r.id],
        x: 0.1 + Math.random()*0.8,
        y: 0.1 + Math.random()*0.8,
        vx: (Math.random()-0.5)*0.0015,
        vy: (Math.random()-0.5)*0.0015,
        speed: Math.floor(20+Math.random()*30),
        occupancy: Math.floor(30+Math.random()*70),
        busId: `B-${Math.floor(100+Math.random()*900)}`,
        nextStop: stopDefs[Math.floor(Math.random()*stopDefs.length)].name,
        eta: Math.floor(1+Math.random()*8),
        angle: Math.random()*Math.PI*2,
      });
    }
  });
}

function drawMap() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);

  const isDark = document.documentElement.getAttribute('data-theme')==='dark' || window.matchMedia('(prefers-color-scheme: dark)').matches;

  ctx.fillStyle = isDark ? '#1e2430' : '#e8edf2';
  ctx.fillRect(0,0,W,H);

  const blocks = [
    {x:.12,y:.12,w:.1,h:.1},{x:.26,y:.12,w:.2,h:.1},
    {x:.52,y:.12,w:.2,h:.1},{x:.78,y:.12,w:.1,h:.1},
    {x:.12,y:.27,w:.1,h:.2},{x:.78,y:.27,w:.1,h:.2},
    {x:.12,y:.52,w:.1,h:.2},{x:.78,y:.52,w:.1,h:.2},
    {x:.12,y:.78,w:.1,h:.1},{x:.26,y:.78,w:.2,h:.1},
    {x:.52,y:.78,w:.2,h:.1},{x:.78,y:.78,w:.1,h:.1},
    {x:.26,y:.27,w:.1,h:.2},{x:.4,y:.27,w:.08,h:.08},
    {x:.52,y:.27,w:.2,h:.08},{x:.26,y:.52,w:.08,h:.2},
    {x:.38,y:.55,w:.22,h:.1},{x:.65,y:.52,w:.1,h:.2},
  ];
  ctx.fillStyle = isDark ? '#2a3344' : '#d0d8e4';
  blocks.forEach(b => {
    ctx.beginPath();
    ctx.roundRect(b.x*W, b.y*H, b.w*W, b.h*H, 4);
    ctx.fill();
  });

  roadNetwork.forEach(r => {
    ctx.beginPath();
    ctx.strokeStyle = isDark ? '#374151' : '#c8d0dc';
    ctx.lineWidth = r.w * zoom;
    ctx.moveTo(r.x1*W, r.y1*H);
    ctx.lineTo(r.x2*W, r.y2*H);
    ctx.stroke();
  });

  stopDefs.forEach(s => {
    const sx = s.x*W, sy = s.y*H;
    ctx.beginPath();
    ctx.arc(sx, sy, s.major ? 6 : 4, 0, Math.PI*2);
    ctx.fillStyle = isDark ? '#4b5563' : '#fff';
    ctx.fill();
    ctx.strokeStyle = isDark ? '#9ca3af' : '#6b7280';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    if(s.major) {
      ctx.fillStyle = isDark ? '#d1d5db' : '#374151';
      ctx.font = '10px var(--font-sans)';
      ctx.textAlign = 'center';
      ctx.fillText(s.name, sx, sy-10);
    }
  });

  const popupEl = document.getElementById('busPopup');
  hoveredBus = null;
  const mx = lastMouse.x, my = lastMouse.y;

  buses.forEach(b => {
    const bx = b.x*W, by = b.y*H;
    const dist = Math.hypot(bx-mx, by-my);
    if(dist < 14) hoveredBus = b;

    ctx.save();
    ctx.translate(bx, by);
    ctx.rotate(Math.atan2(b.vy, b.vx)+Math.PI/2);

    ctx.beginPath();
    ctx.roundRect(-7,-9,14,18,3);
    ctx.fillStyle = b.color;
    ctx.fill();

    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.font = 'bold 8px var(--font-sans)';
    ctx.textAlign = 'center';
    ctx.fillText(b.route, 0, 4);

    ctx.restore();

    if(dist < 14) {
      ctx.beginPath();
      ctx.arc(bx, by, 16, 0, Math.PI*2);
      ctx.strokeStyle = b.color;
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.4;
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  });

  if(hoveredBus) {
    const bx = hoveredBus.x*W;
    const by = hoveredBus.y*H;
    const r = routes.find(r=>r.id===hoveredBus.route);
    document.getElementById('ppBadge').style.background = r ? r.bg : '#eee';
    document.getElementById('ppBadge').style.color = r ? r.color : '#333';
    document.getElementById('ppBadge').textContent = hoveredBus.route;
    document.getElementById('ppTitle').textContent = r ? r.name : hoveredBus.route;
    document.getElementById('ppSub').textContent = 'Bus #'+hoveredBus.busId;
    document.getElementById('ppSpeed').textContent = hoveredBus.speed+' km/h';
    document.getElementById('ppNext').textContent = hoveredBus.nextStop;
    document.getElementById('ppEta').textContent = hoveredBus.eta+' min';
    document.getElementById('ppOcc').textContent = hoveredBus.occupancy+'%';

    let px = bx + 20, py = by - 20;
    if(px + 210 > W) px = bx - 220;
    if(py + 130 > H) py = by - 140;
    popupEl.style.left = px+'px';
    popupEl.style.top = py+'px';
    popupEl.style.opacity = '1';
  } else {
    popupEl.style.opacity = '0';
  }
}

let lastMouse = { x:-999, y:-999 };
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  lastMouse.x = e.clientX - rect.left;
  lastMouse.y = e.clientY - rect.top;
});
canvas.addEventListener('mouseleave', () => { lastMouse = {x:-999,y:-999}; });

function moveBuses() {
  buses.forEach(b => {
    b.x += b.vx;
    b.y += b.vy;
    if(b.x < 0.05 || b.x > 0.95) b.vx *= -1;
    if(b.y < 0.05 || b.y > 0.95) b.vy *= -1;
    b.vx += (Math.random()-0.5)*0.0003;
    b.vy += (Math.random()-0.5)*0.0003;
    const maxV = 0.002;
    b.vx = Math.max(-maxV, Math.min(maxV, b.vx));
    b.vy = Math.max(-maxV, Math.min(maxV, b.vy));
  });
}

function updateStats() {
  tick++;
  if(tick % 60 === 0) {
    routes.forEach(r => {
      r.eta = Math.max(1, r.eta + Math.floor(Math.random()*3)-1);
      buildRouteList();
    });
    const secs = Math.floor(tick/60);
    document.getElementById('updateTime').textContent = secs < 60 ? secs+'s ago' : 'just now';
  }
}

function loop() {
  moveBuses();
  drawMap();
  updateStats();
  animFrame = requestAnimationFrame(loop);
}

function zoomIn() { zoom = Math.min(2, zoom+0.2); }
function zoomOut() { zoom = Math.max(0.6, zoom-0.2); }
function resetView() { zoom = 1; }

window.addEventListener('resize', () => { resize(); });
resize();
buildRouteList();
initBuses();
loop();

document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase();
  document.querySelectorAll('.route-item').forEach(el => {
    el.style.display = el.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
});
</script>
